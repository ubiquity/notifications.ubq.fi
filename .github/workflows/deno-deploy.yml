name: Deploy (Deno Deploy)

on:
  push:
    branches: [development]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT: notifications-ubq-fi
      PREVIEW_PROJECT: notifications-ubq-fi-preview
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "${HOME}/.bun/bin" >> "$GITHUB_PATH"

      - name: Install deployctl
        run: |
          deno install -gArf jsr:@deno/deployctl@1.12.0
          echo "${HOME}/.deno/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          target="$PREVIEW_PROJECT"
          prod_flag=""
          if [ "${GITHUB_REF_NAME}" = "development" ]; then
            target="$PROJECT"
            prod_flag="--prod"
          fi
          deployctl deploy \
            --project="$target" \
            $prod_flag \
            --entrypoint=serve.ts \
            --root="." \
            --token="$DENO_DEPLOY_TOKEN" \
            --include="static/**" \
            --include="serve.ts" \
            --include="deno.json"
