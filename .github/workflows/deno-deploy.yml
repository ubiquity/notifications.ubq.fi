name: Deno Deploy

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: notifications-ubq-fi
      entrypoint: serve.ts
      bun_version: latest
      install_command: bun install
      build_command: bun run build
      include: |
        static/**
        serve.ts
        deno.json
    secrets: inherit
