name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
          cache: true

      - name: Install dependencies
        run: bun ci --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            junit.xml
            coverage

      - name: Build
        run: bun run build
        env: # Set environment variables for the build
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'example' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static
          path: static
