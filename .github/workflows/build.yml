name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Bun global cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies (frozen lockfile)
        run: bun ci

      - name: Lint and format check
        run: |
          bunx eslint . --max-warnings=0
          bunx prettier --check .

      - name: Spell check (non-blocking)
        run: |
          bunx cspell --config .cspell.json "test/**/*.ts" "tests/smoke.spec.ts" || true

      # Type checking omitted to match previous CI behavior

      - name: Test (with JUnit + coverage)
        shell: bash
        run: |
          if git ls-files | grep -Eq '\\.(test|spec)\\.(ts|tsx|js|jsx)$'; then
            bun test
          else
            echo "No test files present; skipping bun test"
            echo '<testsuite name="empty" tests="0"/>' > junit.xml
          fi

      - name: Ensure test artifacts exist
        if: always()
        run: |
          [ -f junit.xml ] || echo '<testsuite name="empty" tests="0"/>' > junit.xml
          [ -d coverage ] || mkdir -p coverage

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: junit.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://wfzpewmlyiozupulbuur.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmenBld21seWlvenVwdWxidXVyIiwicm9zZSI6ImFub24iLCJpYXQiOjE2OTU2NzQzMzksImV4cCI6MjAxMTI1MDMzOX0.SKIL3Q0NOBaMehH0ekFspwgcu3afp3Dl9EDzPqs1nKs' }}
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static
          path: static
