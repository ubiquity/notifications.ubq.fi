name: Deno Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # NOTE: PRs from forks do not receive repository secrets, so attempting to deploy would fail.
  # Keep a green "deploy" check for PRs by building with placeholder env vars instead.
  deploy:
    # Run dry-run build for PRs and for fork pushes (no deploy secrets there).
    if: github.event_name == 'pull_request' || github.repository != 'ubiquity/notifications.ubq.fi'
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
          cache: true

      - name: Install dependencies
        run: bun ci --frozen-lockfile

      - name: Build (PR dry-run)
        run: bun run build
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: example

  deploy-production:
    # Only deploy from canonical upstream repo.
    if: github.event_name != 'pull_request' && github.repository == 'ubiquity/notifications.ubq.fi'
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: notifications-ubq-fi
      entrypoint: serve.ts
      bun_version: 1.3.8 # keep in sync with .bun-version
      install_command: bun ci --frozen-lockfile
      build_command: bun run build
      include: |
        static/**
        serve.ts
        deno.json
      debug_fetch_fail: true
    secrets: inherit
