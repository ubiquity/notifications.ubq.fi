[test]
# Ensure DOM APIs exist in tests
preload = ["./tests/happydom-setup.ts", "./tests/setup-env.ts"]

# Coverage output is used by CI (text + lcov)
coverage = true
coverageReporter = ["text", "lcov"]

# Keep local test output human-readable (default console reporter).
# CI can additionally generate JUnit by running:
# `bun test --reporter=junit --reporter-outfile=junit.xml`
